<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ClearSignals AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#0B1929;color:#F5F7FA;height:100vh;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;background:#112336;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo{font-size:14px;font-weight:800;letter-spacing:.06em;cursor:pointer}.logo b{color:#C9A84C}
.logo .ver{font-size:9px;color:#8A9BAD;font-weight:400;margin-left:4px}
.cfg{display:flex;align-items:center;gap:10px}
.cfg select{background:#112336;border:1px solid rgba(255,255,255,0.08);color:#F5F7FA;padding:3px 8px;border-radius:3px;font-size:10px}
.main{display:flex;height:calc(100vh - 42px)}
.left{width:340px;min-width:340px;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;overflow-y:auto;padding:10px}
.left::-webkit-scrollbar,.right::-webkit-scrollbar{width:4px}
.left::-webkit-scrollbar-thumb,.right::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.right{flex:1;overflow-y:auto;padding:16px 20px}
textarea{width:100%;background:#112336;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:10px;color:#F5F7FA;font-size:11px;font-family:monospace;line-height:1.5;resize:none;outline:none}
textarea:focus{border-color:#C9A84C}
textarea::placeholder{color:#8A9BAD;opacity:.5}
.btn{width:100%;padding:10px 0;margin-top:6px;border:none;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn:disabled{opacity:.4;cursor:default}
.btn-gold{background:#C9A84C;color:#0B1929}.btn-gold:hover:not(:disabled){background:#F0CC6E}
.btn-ghost{background:rgba(255,255,255,0.04);color:#8A9BAD;border:1px solid rgba(255,255,255,0.08)}
.btn-ghost:hover{background:rgba(255,255,255,0.08)}
.btn-action{background:rgba(46,139,192,0.12);border:1px solid rgba(46,139,192,0.3);color:#2E8BC0;padding:8px 0;font-size:10px}
.btn-action:hover{background:rgba(46,139,192,0.22)}
.btn-coming{background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.12);color:#8A9BAD;padding:8px 0;font-size:10px;cursor:default}
.slbl{font-size:8px;font-weight:700;letter-spacing:.12em;color:#8A9BAD;margin:8px 0 5px;text-transform:uppercase}
.mode-toggle{display:flex;margin-bottom:8px;border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
.mode-btn{flex:1;padding:7px 0;text-align:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;border:none;background:rgba(255,255,255,0.03);color:#8A9BAD}
.mode-btn.active{background:rgba(201,168,76,0.15);color:#C9A84C;border-bottom:2px solid #C9A84C}
.mode-btn:hover:not(.active){background:rgba(255,255,255,0.06)}
#loadBox{display:none;text-align:center;padding:30px 20px}
#loadBox .spin{font-size:28px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tcard{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-left:3px solid #C9A84C;border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .12s}
.tcard:hover{background:rgba(255,255,255,0.07);border-color:rgba(201,168,76,0.4)}
.tcard .tc-name{font-size:12px;font-weight:700;color:#F5F7FA}
.tcard .tc-company{font-size:10px;color:#C9A84C;margin-top:1px}
.tcard .tc-meta{display:flex;gap:8px;margin-top:4px;font-size:9px;color:#8A9BAD}
.tcard .tc-stage{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 6px;border-radius:2px;background:rgba(46,139,192,0.12);color:#2E8BC0}
.tcard .tc-pill{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.06)}
.tcard.closed{opacity:.5;border-left-color:#8A9BAD}
.ecard{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-left:3px solid rgba(255,255,255,0.08);border-radius:0 5px 5px 0;padding:6px 8px;margin-bottom:3px;cursor:pointer;transition:all .12s}
.ecard:hover{border-color:rgba(201,168,76,0.3)}
.ecard.act{background:rgba(255,255,255,0.07);border-color:#C9A84C}
.dir{font-size:7px;font-weight:700;letter-spacing:.06em;padding:1px 4px;border-radius:2px;display:inline-block}
.dir.in{color:#2E8BC0;background:rgba(46,139,192,0.15)}.dir.out{color:#C9A84C;background:rgba(201,168,76,0.15)}
.ecard .num{font-size:10px;font-weight:600;margin-left:3px}
.ecard .meta{font-size:9px;color:#8A9BAD;margin-top:1px}
.ecard .snip{font-size:9px;color:#8A9BAD;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:295px}
.pill{font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px}
.add-email-box{background:rgba(201,168,76,0.04);border:1px dashed rgba(201,168,76,0.3);border-radius:6px;padding:8px;margin-bottom:10px}
.add-email-box .t{font-size:9px;font-weight:700;color:#C9A84C;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.add-email-box textarea{height:80px;font-size:10px}
.add-email-box .btn{padding:7px 0;font-size:10px}
.scores{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.gauge{text-align:center;min-width:75px}
.gauge .val{font-size:30px;font-weight:300;font-family:Georgia,'Times New Roman',serif;line-height:1}
.gauge .mx{font-size:13px;color:#8A9BAD;font-weight:300}
.gauge .lbl{font-size:8px;font-weight:700;letter-spacing:.1em;color:#8A9BAD;margin-top:3px;text-transform:uppercase}
.stage{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(27,79,138,0.15);color:#2E8BC0;border:1px solid rgba(46,139,192,0.2);margin-bottom:12px}
.box{border-radius:6px;padding:8px 12px;margin-bottom:10px}
.box .t{font-size:8px;font-weight:700;letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase}
.box .txt{font-size:12px;line-height:1.6;color:#F5F7FA}
.box.sum{background:rgba(13,115,119,0.08);border:1px solid rgba(13,115,119,0.18)}.box.sum .t{color:#0D7377}
.box.coach{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15)}.box.coach .t{color:#C9A84C}.box.coach .txt{color:#F0CC6E}
.box.ns{background:rgba(27,79,138,0.1);border:1px solid rgba(46,139,192,0.2)}.box.ns .t{color:#2E8BC0}
.box.action{background:rgba(46,139,192,0.06);border:1px solid rgba(46,139,192,0.2)}.box.action .t{color:#2E8BC0}
.box.health{border:1px solid rgba(255,255,255,0.1);padding:10px 14px}.box.health .t{color:#8A9BAD}
.box.tone{background:rgba(13,115,119,0.06);border:1px solid rgba(13,115,119,0.15)}.box.tone .t{color:#0D7377}
.health-badge{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-right:8px}
.health-badge.healthy{background:rgba(26,122,74,0.15);color:#1A7A4A;border:1px solid rgba(26,122,74,0.3)}
.health-badge.at_risk,.health-badge.at-risk{background:rgba(232,160,32,0.12);color:#E8A020;border:1px solid rgba(232,160,32,0.3)}
.health-badge.critical{background:rgba(192,57,43,0.15);color:#C0392B;border:1px solid rgba(192,57,43,0.3)}
.health-badge.lost_momentum,.health-badge.lost-momentum{background:rgba(192,57,43,0.1);color:#C0392B;border:1px solid rgba(192,57,43,0.2)}
.traj-badge{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.traj-badge.improving{background:rgba(26,122,74,0.15);color:#1A7A4A}.traj-badge.stable{background:rgba(46,139,192,0.12);color:#2E8BC0}.traj-badge.declining{background:rgba(232,160,32,0.12);color:#E8A020}.traj-badge.stalled{background:rgba(192,57,43,0.15);color:#C0392B}
.unresolved{background:rgba(192,57,43,0.06);border:1px solid rgba(192,57,43,0.2);border-radius:6px;padding:8px 12px;margin-bottom:10px}
.unresolved .t{font-size:8px;font-weight:700;letter-spacing:.1em;color:#C0392B;margin-bottom:6px;text-transform:uppercase}
.unresolved li{font-size:11px;color:#F5F7FA;line-height:1.5;margin-bottom:4px;margin-left:14px}
.sig{background:rgba(255,255,255,0.04);border-radius:5px;padding:6px 9px;margin-bottom:4px;border-left:3px solid rgba(255,255,255,0.08)}
.sig.red{border-left-color:#C0392B}.sig.yellow{border-left-color:#E8A020}.sig.green{border-left-color:#1A7A4A}
.sig .sr{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.badge{font-size:7px;font-weight:700;letter-spacing:.08em;padding:1px 5px;border-radius:2px;text-transform:uppercase}
.badge.red{background:rgba(192,57,43,0.15);color:#C0392B}.badge.yellow{background:rgba(232,160,32,0.12);color:#E8A020}.badge.green{background:rgba(26,122,74,0.15);color:#1A7A4A}
.sig .sd{font-size:11px;color:#F5F7FA;line-height:1.4}
.sig .sq{font-size:10px;color:#8A9BAD;font-style:italic;margin-top:2px;border-left:2px solid rgba(255,255,255,0.1);padding-left:6px}
.ph{display:flex;align-items:center;justify-content:center;height:100%}
.ph .in{text-align:center}.ph .ico{font-size:36px;margin-bottom:8px}
.ph h3{font-size:14px;color:#C9A84C;margin-bottom:4px}
.ph p{font-size:11px;color:#8A9BAD;line-height:1.6;max-width:280px}
.grade-letter{font-size:28px;font-weight:700;font-family:Georgia,serif;line-height:1}
.grade-letter.A{color:#1A7A4A}.grade-letter.B{color:#2E8BC0}.grade-letter.C{color:#E8A020}.grade-letter.D,.grade-letter.F{color:#C0392B}
.breq{background:rgba(46,139,192,0.06);border:1px solid rgba(46,139,192,0.15);border-radius:5px;padding:5px 8px;margin-bottom:3px;font-size:11px;color:#F5F7FA;display:flex;align-items:flex-start;gap:6px}
.breq:before{content:"\25B8";color:#2E8BC0;font-size:10px;margin-top:1px;flex-shrink:0}
/* Draft modal */
.draft-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center}
.draft-modal{background:#112336;border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:16px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto}
.draft-modal .t{font-size:10px;font-weight:700;color:#C9A84C;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.draft-modal .draft-text{font-size:12px;color:#F5F7FA;line-height:1.7;white-space:pre-wrap;margin-bottom:12px;padding:12px;background:rgba(255,255,255,0.04);border-radius:5px;border:1px solid rgba(255,255,255,0.08)}
.draft-modal .btn-row{display:flex;gap:8px}
.draft-modal .btn-row .btn{flex:1}
@media(max-width:768px){.main{flex-direction:column}.left{width:100%;min-width:auto;max-height:45vh}.right{max-height:55vh}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo" onclick="goHome()">CLEAR<b>SIGNALS</b> AI<span class="ver">v1.4</span></div>
  <div class="cfg"><select id="modelSel"><option value="flash" selected>Gemini Flash</option><option value="haiku">Claude Haiku</option><option value="sonnet">Claude Sonnet</option><option value="flash-lite">Flash Lite</option><option value="pro">Gemini Pro</option></select></div>
</div>
<div class="main">
  <div class="left" id="L"></div>
  <div class="right" id="R"></div>
</div>
<div id="draftOverlay"></div>
<script>
var screen='home',threads=[],currentThread=null,viewIdx=-1,currentMode='coaching';
function $(id){return document.getElementById(id)}
function col(v,mx){return mx===10?(v>=7?'#1A7A4A':v>=4?'#E8A020':'#C0392B'):(v>=65?'#1A7A4A':v>=35?'#E8A020':'#C0392B')}
function esc(s){return(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function gradeCol(g){g=(g||'C')[0].toUpperCase();return g==='A'?'#1A7A4A':g==='B'?'#2E8BC0':g==='C'?'#E8A020':'#C0392B'}
function ago(d){if(!d)return'';var ms=Date.now()-new Date(d).getTime();var m=Math.floor(ms/60000);if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago'}
function jp(v){if(!v)return[];if(typeof v==='string')try{return JSON.parse(v)}catch(e){return[]}return v}

// == EMAIL GATE ==
function checkGate(){
  if(document.cookie.indexOf('cs_email=')>=0){goHome();return}
  showGate();
}
function showGate(){
  $('L').innerHTML='';
  $('R').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%"><div style="max-width:480px;padding:24px"><div style="text-align:center;margin-bottom:20px"><div style="font-size:14px;font-weight:800;letter-spacing:.06em">CLEAR<span style="color:#C9A84C">SIGNALS</span> AI</div><div style="font-size:10px;color:#8A9BAD;margin-top:4px">Sales Intelligence Engine</div></div><div style="font-size:13px;color:#F5F7FA;line-height:1.7;margin-bottom:16px">Every email your prospect sends is full of signals... buying intent, competitive threats, objections, urgency shifts, and personality cues that most reps miss.</div><div style="font-size:13px;color:#F5F7FA;line-height:1.7;margin-bottom:16px">ClearSignals AI reads what your customers are <em>really</em> saying. It analyzes every inbound email and gives you actionable suggestions... ideas on what to address, the right tone to strike, and cues you might otherwise miss. When your rep responds, it grades the response against what was recommended.</div><div style="font-size:13px;color:#F5F7FA;line-height:1.7;margin-bottom:20px">Stop guessing. Start seeing the signals.</div><div style="margin-bottom:12px"><input id="gateEmail" type="email" placeholder="Enter your email to get started" style="width:100%;padding:10px 12px;background:#112336;border:1px solid rgba(201,168,76,0.3);border-radius:5px;color:#F5F7FA;font-size:12px;outline:none" onkeypress="if(event.key===\'Enter\')submitGate()"></div><button class="btn btn-gold" onclick="submitGate()" style="width:100%">Get Started</button><div style="font-size:9px;color:#8A9BAD;text-align:center;margin-top:10px">No account required. We just need your email to save your threads.</div></div></div>';
}
function submitGate(){
  var email=document.getElementById('gateEmail');
  if(!email||!email.value.trim()||email.value.indexOf('@')<1){alert('Please enter a valid email address');return}
  var val=email.value.trim();
  document.cookie='cs_email='+encodeURIComponent(val)+';max-age=31536000;path=/;SameSite=Lax';
  goHome();
}
checkGate();

// == HOME ==
function goHome(){screen='home';viewIdx=-1;currentThread=null;
  fetch('/api/threads').then(function(r){return r.json()}).then(function(d){threads=d.threads||[];renderHome()}).catch(function(){threads=[];renderHome()});
}
function renderHome(){
  var h='<button class="btn btn-gold" onclick="showNewThread()" style="margin-bottom:10px">+ New Thread</button>';
  var active=threads.filter(function(t){return t.status==='active'});
  var closed=threads.filter(function(t){return t.status!=='active'});
  if(active.length){
    h+='<div class="slbl">ACTIVE THREADS ('+active.length+')</div>';
    for(var i=0;i<active.length;i++){var t=active[i];
      h+='<div class="tcard" onclick="openThread('+t.id+')"><div class="tc-name">'+esc(t.contact_name||'Unknown')+'</div>';
      if(t.company_name)h+='<div class="tc-company">'+esc(t.company_name)+'</div>';
      h+='<div style="display:flex;gap:6px;margin-top:4px"><span class="tc-pill" style="color:'+col(t.intent||1,10)+'">Intent '+(t.intent||'?')+'</span><span class="tc-pill" style="color:'+col(t.win_pct||0,100)+'">'+(t.win_pct||0)+'%</span><span class="tc-stage">'+(t.deal_stage||'?').replace(/_/g,' ')+'</span></div>';
      h+='<div class="tc-meta"><span>'+(t.email_count||0)+' emails</span><span>'+ago(t.last_email_at||t.updated_at)+'</span></div></div>';
    }
  }
  if(closed.length){h+='<div class="slbl" style="margin-top:12px">CLOSED ('+closed.length+')</div>';
    for(var i=0;i<closed.length;i++){var t=closed[i];h+='<div class="tcard closed" onclick="openThread('+t.id+')"><div class="tc-name">'+esc(t.contact_name||'Unknown')+'</div><div class="tc-meta"><span>'+(t.email_count||0)+' emails</span></div></div>'}
  }
  if(!threads.length)h+='<div style="padding:20px;text-align:center;color:#8A9BAD;font-size:11px">No threads yet. Start one!</div>';
  $('L').innerHTML=h;
  $('R').innerHTML='<div class="ph"><div class="in"><div class="ico">&#x1F4E7;</div><h3>ClearSignals AI</h3><p>Select a thread to continue coaching, or start a new one.</p></div></div>';
}

// == NEW THREAD ==
function showNewThread(){screen='new_thread';
  var h='<div class="mode-toggle"><button class="mode-btn active" id="mC" onclick="setM(\'coaching\')">&#x1F3AF; Coaching</button><button class="mode-btn" id="mP" onclick="setM(\'postmortem\')">&#x1F50D; Postmortem</button></div>';
  h+='<div class="slbl">PASTE YOUR EMAIL THREAD</div>';
  h+='<textarea id="ta" style="height:calc(100vh - 200px)" placeholder="Paste the full email thread here..."></textarea>';
  h+='<button class="btn btn-gold" id="goBtn" onclick="doNewThread()">Analyze Thread</button>';
  h+='<button class="btn btn-ghost" onclick="goHome()" style="margin-top:4px">Cancel</button>';
  h+='<div id="loadBox"><div class="spin">&#x1F50D;</div><div id="loadMsg" style="font-size:14px;color:#C9A84C;margin:10px 0">Analyzing...</div><div id="timer" style="font-size:24px;color:#F0CC6E;font-weight:700">0.0s</div><div id="errMsg" style="color:#C0392B;font-size:11px;margin-top:10px"></div></div>';
  $('L').innerHTML=h;
  $('R').innerHTML='<div class="ph"><div class="in"><div class="ico">&#x1F4DD;</div><h3>Paste Your Thread</h3><p>Paste the email thread on the left. ClearSignals will parse every email, analyze the trajectory, and tell you what to do next.</p></div></div>';
}
function setM(m){currentMode=m;var a=document.getElementById('mC'),b=document.getElementById('mP');if(a)a.className='mode-btn'+(m==='coaching'?' active':'');if(b)b.className='mode-btn'+(m==='postmortem'?' active':'')}

function doNewThread(){
  var txt=$('ta').value.trim();if(!txt){alert('Paste an email thread first');return}
  $('ta').style.display='none';$('goBtn').style.display='none';
  var mt=document.querySelector('.mode-toggle');if(mt)mt.style.display='none';
  $('loadBox').style.display='block';$('loadMsg').textContent='Analyzing trajectory...';
  var t0=performance.now(),iv=setInterval(function(){var e=$('timer');if(e)e.textContent=((performance.now()-t0)/1000).toFixed(1)+'s'},100);
  fetch('/api/threads',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt,model:$('modelSel').value})})
  .then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.error)});return r.json()})
  .then(function(data){clearInterval(iv);openThread(data.thread.id)})
  .catch(function(ex){clearInterval(iv);var e=$('errMsg');if(e)e.textContent=ex.message;setTimeout(goHome,4000)});
}

// == OPEN THREAD ==
function openThread(id){screen='thread';viewIdx=-1;
  fetch('/api/threads/'+id).then(function(r){return r.json()}).then(function(d){currentThread=d;renderThread()}).catch(function(e){alert('Error: '+e.message);goHome()})
}

// == RENDER THREAD ==
function renderThread(){
  if(!currentThread)return;
  var t=currentThread.thread,emails=currentThread.emails||[],ctx=currentThread.context||{};
  var h='';
  // Add email box
  h+='<div class="add-email-box"><div class="t">&#x2709; Paste Next Email</div>';
  h+='<textarea id="addTa" placeholder="Paste the newest email here..."></textarea>';
  h+='<button class="btn btn-gold" onclick="doAddEmail('+t.id+')" style="margin-top:4px">Analyze New Email</button></div>';
  // Header with scores
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
  h+='<div style="display:flex;align-items:center;gap:6px">';
  h+='<span style="font-size:11px;font-weight:700;color:#C9A84C">'+esc(t.contact_name||'Thread')+'</span>';
  h+='<span class="pill" style="background:rgba(255,255,255,0.06);color:'+col(t.intent||1,10)+'">'+(t.intent||'?')+'</span>';
  h+='<span class="pill" style="background:rgba(255,255,255,0.06);color:'+col(t.win_pct||0,100)+'">'+(t.win_pct||0)+'%</span>';
  h+='</div>';
  h+='<span style="font-size:9px;color:#8A9BAD;cursor:pointer;text-decoration:underline" onclick="goHome()">&#x2190; All</span></div>';
  // Email cards — NEWEST FIRST
  for(var i=emails.length-1;i>=0;i--){
    var em=emails[i],a=em.analysis||{},isIn=em.direction==='inbound',sigs=a.signals||[];
    var worst='rgba(255,255,255,0.08)';
    for(var j=0;j<sigs.length;j++){if(sigs[j].severity==='red'){worst='#C0392B';break}if(sigs[j].severity==='yellow')worst='#E8A020';if(sigs[j].severity==='green'&&worst!=='#E8A020')worst='#1A7A4A'}
    var gr='';if(!isIn&&a.outbound_coaching&&a.outbound_coaching.rep_grade)gr=a.outbound_coaching.rep_grade[0].toUpperCase();
    h+='<div class="ecard '+(viewIdx===i?'act':'')+'" style="border-left-color:'+worst+'" onclick="selV('+i+')">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:3px">';
    h+='<span class="dir '+(isIn?'in':'out')+'">'+(isIn?'IN':'OUT')+'</span><span class="num">#'+em.email_index+'</span>';
    if(gr)h+='<span style="font-size:9px;font-weight:700;color:'+gradeCol(gr)+'">'+gr+'</span>';
    h+='</div><div style="display:flex;gap:4px">';
    if(a.intent!=null)h+='<span class="pill" style="background:rgba(255,255,255,0.06);color:'+col(a.intent,10)+'">'+a.intent+'</span>';
    if(a.win_pct!=null)h+='<span class="pill" style="background:rgba(255,255,255,0.06);color:'+col(a.win_pct,100)+'">'+a.win_pct+'%</span>';
    h+='</div></div>';
    h+='<div class="meta">'+esc(em.sender)+(em.email_date?' &middot; '+esc(em.email_date):'')+'</div>';
    h+='<div class="snip">'+esc(em.snippet)+'</div></div>';
  }
  // Thread actions
  h+='<button class="btn btn-ghost" onclick="goHome()" style="margin-top:8px">&#x2190; Back to Threads</button>';
  h+='<button class="btn btn-ghost" onclick="toggleClose('+t.id+')" style="margin-top:4px">'+(t.status==='closed'?'Reopen Thread':'Close Thread')+'</button>';
  // Loading box
  h+='<div id="loadBox" style="display:none"><div class="spin" style="font-size:24px">&#x1F50D;</div><div id="loadMsg" style="font-size:12px;color:#C9A84C;margin:6px 0">Analyzing...</div><div id="timer" style="font-size:18px;color:#F0CC6E;font-weight:700">0.0s</div><div id="errMsg" style="color:#C0392B;font-size:10px;margin-top:6px"></div></div>';
  $('L').innerHTML=h;
  // Auto-select newest email if nothing selected
  if(viewIdx===-1&&emails.length>0)viewIdx=emails.length-1;
  renderRight();
}

function selV(i){viewIdx=i;renderThread()}

function renderRight(){
  if(!currentThread)return;
  var t=currentThread.thread,emails=currentThread.emails||[],ctx=currentThread.context||{};
  var h='';
  if(viewIdx<0||viewIdx>=emails.length){$('R').innerHTML='';return}

  // EMAIL DETAIL — always show the selected email
  var em=emails[viewIdx];if(!em){$('R').innerHTML='';return}
  var a=em.analysis||{},isIn=em.direction==='inbound',sigs=a.signals||[];

  h+='<div style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span class="dir '+(isIn?'in':'out')+'" style="font-size:9px;padding:2px 6px">'+(isIn?'INBOUND':'OUTBOUND')+'</span><span style="font-size:16px;font-weight:700">Email #'+em.email_index+'</span></div>';
  h+='<div style="font-size:11px;color:#8A9BAD;margin-top:3px">'+esc(em.sender)+' &middot; '+esc(em.email_date)+'</div></div>';

  // Scores
  if(a.intent!=null){h+='<div class="scores" style="margin-bottom:12px"><div class="gauge"><div class="val" style="color:'+col(a.intent,10)+'">'+a.intent+'<span class="mx">/10</span></div><div class="lbl">Intent</div></div><div class="gauge"><div class="val" style="color:'+col(a.win_pct,100)+'">'+a.win_pct+'<span class="mx">%</span></div><div class="lbl">Win %</div></div>';
    if(!isIn&&a.outbound_coaching&&a.outbound_coaching.rep_grade){var g2=a.outbound_coaching.rep_grade[0].toUpperCase();h+='<div class="gauge"><div class="grade-letter '+g2+'">'+g2+'</div><div class="lbl">Grade</div></div>'}
    h+='</div>'}

  // Deal health badges
  if(t.deal_health||t.trajectory){h+='<div style="margin-bottom:10px">';if(t.deal_health)h+='<span class="health-badge '+(t.deal_health||'').replace(/_/g,'-')+'">'+esc(t.deal_health||'').replace(/_/g,' ')+'</span>';if(t.trajectory)h+='<span class="traj-badge '+(t.trajectory||'')+'">&#x2192; '+esc(t.trajectory)+'</span>';h+='</div>'}

  if(a.summary)h+='<div class="box sum"><div class="t">WHAT THIS EMAIL MEANS</div><div class="txt">'+esc(a.summary)+'</div></div>';

  // Inbound coaching
  if(isIn&&a.inbound_coaching){var ib=a.inbound_coaching;
    if(ib.buyer_analysis)h+='<div class="box" style="background:rgba(46,139,192,0.06);border:1px solid rgba(46,139,192,0.2)"><div class="t" style="color:#2E8BC0">&#x1F9E0; BUYER ANALYSIS</div><div class="txt">'+esc(ib.buyer_analysis)+'</div></div>';
    if(ib.buyer_requests&&ib.buyer_requests.length){h+='<div class="box" style="background:rgba(46,139,192,0.04);border:1px solid rgba(46,139,192,0.15)"><div class="t" style="color:#2E8BC0">&#x1F4CB; BUYER REQUESTS ('+ib.buyer_requests.length+')</div>';for(var bi=0;bi<ib.buyer_requests.length;bi++)h+='<div class="breq">'+esc(ib.buyer_requests[bi])+'</div>';h+='</div>'}
    if(ib.recommended_response){
      h+='<div class="box coach"><div class="t">&#x1F4DD; RECOMMENDED RESPONSE</div><div class="txt">'+esc(ib.recommended_response)+'</div></div>';
      // ACTION BUTTONS
      h+='<button class="btn btn-action" onclick="showUpgrade()">&#x270D; Write It For Me</button>';
      h+='<button class="btn btn-coming" style="margin-top:4px" onclick="showComingSoon()">&#x1F4CE; Find Marketing Content</button>';
    }
    if(ib.watch_for)h+='<div class="box" style="background:rgba(232,160,32,0.06);border:1px solid rgba(232,160,32,0.2);margin-top:10px"><div class="t" style="color:#E8A020">&#x1F440; WATCH FOR</div><div class="txt">'+esc(ib.watch_for)+'</div></div>';
  }

  // Outbound grading
  if(!isIn&&a.outbound_coaching){var ob=a.outbound_coaching;
    h+='<div class="box" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);padding:10px 14px"><div class="t" style="color:#8A9BAD">&#x1F4CA; REP PERFORMANCE</div>';
    if(ob.rep_grade)h+='<div style="font-size:12px;color:'+gradeCol(ob.rep_grade[0])+';font-weight:600;margin-bottom:6px">Grade: '+esc(ob.rep_grade)+'</div>';
    if(ob.did_well)h+='<div style="font-size:12px;color:#1A7A4A;line-height:1.5;margin-bottom:6px">&#x2713; <strong>Did well:</strong> '+esc(ob.did_well)+'</div>';
    if(ob.missed)h+='<div style="font-size:12px;color:#C0392B;line-height:1.5;margin-bottom:6px">&#x2717; <strong>Missed:</strong> '+esc(ob.missed)+'</div>';
    if(ob.tone_match)h+='<div style="font-size:12px;color:#8A9BAD;line-height:1.5">&#x1F3A4; <strong>Tone:</strong> '+esc(ob.tone_match)+'</div>';
    h+='</div>';
  }

  // Unresolved items from context
  var ui=jp(ctx.unresolved_items);if(ui.length){h+='<div class="unresolved"><div class="t">&#x26A0; UNRESOLVED ('+ui.length+')</div><ul>';for(var i=0;i<ui.length;i++)h+='<li>'+esc(ui[i])+'</li>';h+='</ul></div>'}

  // Signals
  if(sigs.length){h+='<div class="slbl">SIGNALS ('+sigs.length+')</div>';
    for(var si=0;si<sigs.length;si++){var s=sigs[si];h+='<div class="sig '+(s.severity||'yellow')+'"><div class="sr"><span class="badge '+(s.severity||'yellow')+'">'+(s.severity||'')+'</span><span class="badge '+(s.severity||'yellow')+'" style="opacity:.7">'+(s.type||'')+'</span></div><div class="sd">'+esc(s.desc)+'</div>';if(s.quote)h+='<div class="sq">"'+esc(s.quote)+'"</div>';h+='</div>'}
  }

  $('R').innerHTML=h;
}

// == WRITE IT FOR ME ==
function showUpgrade(){
  $('draftOverlay').innerHTML='<div class="draft-overlay" onclick="closePopup(event)"><div class="draft-modal" onclick="event.stopPropagation()"><div style="text-align:center;padding:20px 10px"><div style="font-size:32px;margin-bottom:12px">&#x270D;</div><div style="font-size:16px;font-weight:700;color:#C9A84C;margin-bottom:8px">Write It For Me</div><div style="font-size:12px;color:#F5F7FA;line-height:1.6;margin-bottom:16px">Upgrade to <strong style="color:#C9A84C">TrueWriting</strong> to automatically draft responses in your authentic voice.</div><div style="font-size:11px;color:#F5F7FA;line-height:1.6;margin-bottom:16px">TrueWriting analyzes <strong style="color:#C9A84C">your</strong> communication across emails, videos, call transcripts, and more... building a proprietary profile of <strong style="color:#C9A84C">30+ distinct communication variables</strong> that define how you write, speak, and persuade.</div><div style="font-size:11px;color:#8A9BAD;line-height:1.5;margin-bottom:16px">The result: drafted responses that follow ClearSignals coaching... written the way <em>you</em> actually communicate.</div><button class="btn btn-gold" onclick="closePopup()" style="max-width:200px;margin:0 auto">Got It</button></div></div></div>';
}

function showComingSoon(){
  $('draftOverlay').innerHTML='<div class="draft-overlay" onclick="closePopup(event)"><div class="draft-modal" onclick="event.stopPropagation()"><div style="text-align:center;padding:20px 10px"><div style="font-size:32px;margin-bottom:12px">&#x1F4CE;</div><div style="font-size:16px;font-weight:700;color:#2E8BC0;margin-bottom:8px">Find Marketing Content</div><div style="font-size:12px;color:#F5F7FA;line-height:1.6;margin-bottom:16px">Coming soon: ClearSignals will automatically suggest the right case studies, one-pagers, ROI calculators, and battle cards based on what the buyer is asking for.</div><button class="btn btn-ghost" onclick="closePopup()" style="max-width:200px;margin:0 auto">Got It</button></div></div></div>';
}

function closePopup(e){
  if(e&&e.target&&!e.target.classList.contains('draft-overlay'))return;
  $('draftOverlay').innerHTML='';
}

// == ADD EMAIL ==
function doAddEmail(tid){
  var ta=document.getElementById('addTa');if(!ta)return;
  var txt=ta.value.trim();if(!txt){alert('Paste the new email first');return}
  var box=ta.closest('.add-email-box');if(box)box.style.display='none';
  $('loadBox').style.display='block';$('loadMsg').textContent='Analyzing new email...';
  var t0=performance.now(),iv=setInterval(function(){var e=$('timer');if(e)e.textContent=((performance.now()-t0)/1000).toFixed(1)+'s'},100);
  fetch('/api/threads/'+tid+'/emails',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt,model:$('modelSel').value})})
  .then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.error)});return r.json()})
  .then(function(d){clearInterval(iv);currentThread={thread:d.thread,emails:d.emails,context:d.context};viewIdx=-1;renderThread()})
  .catch(function(ex){clearInterval(iv);var e=$('errMsg');if(e)e.textContent=ex.message;setTimeout(renderThread,3000)});
}

// == CLOSE/REOPEN ==
function toggleClose(id){var ns=currentThread&&currentThread.thread.status==='closed'?'active':'closed';
  fetch('/api/threads/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:ns})})
  .then(function(r){return r.json()}).then(function(d){if(currentThread)currentThread.thread=d.thread;renderThread()}).catch(function(e){alert(e.message)})}
</script>
